[project]
name = "zerolang"
version = "0.1.0"
requires-python = ">=3.12"

[dependency-groups]
dev = [
    "ruff",
    "ty",
    "pytest",
]

[tool.ruff]
target-version = "py312"
src = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src", "tests"]

[tool.ty]
environment = { extra-paths = ["src"] }
